  /v1/external/image/image-to-image/:
    post:
      operationId: image_image_to_image_create
      description: The endpoint to start the image to image conversion process. Please
        select the model and provide the source image url.
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: The value should begin from 'Api-Key ' followed by your key
      tags:
      - image
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageToImageConversionRequest'
            examples:
              SuccessResponse:
                value:
                  title: Programmer with the label
                  text: Please add the label 'Hello'
                  model: stable-diffusion-image
                  file_reference: https://tts-clariteia.s3.eu-west-1.amazonaws.com/images/QIMr2ObfNFsaCgn.png
                  additional_fields: {}
                summary: The request example
                description: "\n                You should pass the model and size\
                  \ values. \n                The file_reference is the path to the\
                  \ source image.\n                The model value should be the code\
                  \ of the model you want to use. \n                The additional_fields\
                  \ is optional. Each model can have specific additional fields.\n\
                  \                "
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ImageToImageConversionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImageToImageConversionRequest'
