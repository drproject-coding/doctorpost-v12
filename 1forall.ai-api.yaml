  /v1/external/audio/models/:
    get:
      operationId: audio_models_list
      description: The endpoint to retrieve the list of available audio conversion
        models.
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: The value should begin from 'Api-Key ' followed by your key
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - audio
      security:
      - ApiKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AudioConversionModel'
              examples:
                ExecutedResponse:
                  value:
                  - - code: musicgen-stereo-large
                      name: MusicGen Large (Stereo)
                      description: Creates higher-quality music from text. Ideal if
                        you want the best sound and don’t mind waiting a bit more.
                      credits_per_second: '10.000000'
                      mode: MUSIC
                      enabled: true
                    - code: elevenlabs-sound
                      name: Sound generation (elevenlabs)
                      description: Great for generating short, high-quality sound
                        effects and audio scenes from text prompts—perfect for games,
                        videos, and creative sound design.
                      credits_per_second: '14.000000'
                      mode: SOUND
                      enabled: true
                    - code: musicgen-stereo-melody-large
                      name: MusicGen Melody (Stereo)
                      description: Generate full songs from a melody and a short prompt
                        with rich stereo sound.
                      credits_per_second: '12.000000'
                      mode: MUSIC
                      enabled: true
                    - code: musicgen-melody-large
                      name: Musicgen Melody
                      description: Generate full songs from a melody and a short prompt.
                        Faster and lighter—ideal for quick drafts or ideas.
                      credits_per_second: '16.000000'
                      mode: MUSIC
                      enabled: true
                    - code: musicgen-large
                      name: MusicGen Large
                      description: Turn short text prompts into music. Great for fast,
                        simple generations without needing a melody.
                      credits_per_second: '20.000000'
                      mode: MUSIC
                      enabled: true
                  summary: Success example
                  description: There are three types of models. SOUND, MUSIC, and
                    MUSIC_TO_MUSIC.
          description: ''
