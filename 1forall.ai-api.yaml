                    title: Programmer with the label
                    code_ref: DWA3JQN0Vz2D9xjT
                    output: png
                    text: Please add the label 'Hello'
                    uploaded_image_url: null
                    small_uploaded_image_url: null
                    status: pending
                    created_at: '2025-04-14T07:06:31.236982Z'
                    modified_at: '2025-04-14T07:06:31.237028Z'
                    model:
                      code: stable-diffusion-image
                      name: Stable Diffusion 3.5 ITI
                      description: Produces the most detailed and realistic images
                        to images, though it’s slower, making it ideal for commercial-quality
                        work. Image To Image
                      price: '0.150000'
                    size: null
                    url_file: https://tts-clariteia.s3.eu-west-1.amazonaws.com/images/mVn47X38h8Io03u.png
                    thumbs_up: false
                    thumbs_down: false
                    source_image_path: https://tts-clariteia.s3.eu-west-1.amazonaws.com/images/QIMr2ObfNFsaCgn.png
