openapi: 3.0.3
info:
  title: 1forall.ai API
  version: 0.0.0
  description: 1forall.ai API for starting and retrieving the audio, voice, images
    and video generation process. Please authorise to use the API.
paths:
  /v1/external/audio/check-status/{code_ref}/:
    get:
      operationId: audio_check_status_retrieve
      description: |-
        The endpoint to check the audio conversion status.
        Please use the code_ref value to check the status of the conversion.
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: The value should begin from 'Api-Key ' followed by your key
      - in: path
        name: code_ref
        schema:
          type: string
        required: true
      tags:
      - audio
      security:
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseConversionStatusResponse'
              examples:
                SuccessResponse:
                  value:
                    status: completed
                    response: ''
                  summary: Response example - conversion completed
                  description: The status should be completed and you can upload the
                    file using the url_file from your conversion request or check
                    the response field.
                PendingResponse:
                  value:
                    status: pending
                    response: ''
                  summary: Response example - conversion pending
                  description: If the conversion is in pending status please try to
                    check in a couple seconds.
          description: ''
  /v1/external/audio/conversions/{id}/:
    get:
      operationId: audio_conversions_retrieve
      description: The endpoint to retrieve a specific audio conversion
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: The value should begin from 'Api-Key ' followed by your key
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - audio
      security:
      - ApiKeyAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioConversion'
          description: ''
  /v1/external/audio/convert-to-audio/:
    post:
      operationId: audio_convert_to_audio_create
      description: |-
        The endpoint to start the audio conversion process.
        Please indicate seconds with the step of 0.5
      parameters:
      - in: header
        name: Authorization
        schema:
          type: string
        description: The value should begin from 'Api-Key ' followed by your key
      tags:
      - audio
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AudioConversionRequest'
            examples:
              TextToSoundRequest:
                value:
                  title: Fun sound
                  text: Create a fun sound with bells.
                  model: elevenlabs-sound
                  seconds: 1
                summary: Text to sound request
                description: "You should pass the title, text, model, and seconds.\n\
                  \                Please indicate seconds with the step of 0.5\n\
                  \                            "
              TextToMusicRequest:
                value:
                  title: New Year's Bells
                  text: A short melody about New Year's bells and happiness.
                  model: musicgen-stereo-large
                  seconds: 8
                summary: Text to music request
                description: "You should pass the title, text, model, and seconds.\n\
                  \                Please indicate seconds with the step of 0.5\n\
                  \                                "
              MusicToMusicRequest:
                value:
                  title: New Year's Bells With Claps
                  text: Add clapping hands
                  model: musicgen-stereo-melody-large-a2a
                  seconds: 8
                  source_path: https://tts-clariteia.s3.eu-west-1.amazonaws.com/audio/ecgKgt0qHBCD318.mp3
                summary: Music to Music request
                description: "You should pass the title, text, model, seconds, and\
                  \ source_path.\n                Please indicate seconds with the\
                  \ step of 0.5\n                                    "
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AudioConversionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AudioConversionRequest'
        required: true
      security:
      - ApiKeyAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioConversion'
              examples:
                TextToSoundResponse:
                  value:
                    id: 19
                    title: Fun sound
                    code_ref: x0n11H7TDMvdlZe6
                    output: mp3
                    text: Create a fun sound with bells.
                    uploaded_audio_url: null
                    seconds: 1
                    status: pending
                    created_at: '2025-04-15T05:39:10.492958Z'
                    modified_at: '2025-04-15T05:39:10.493089Z'
                    model:
                      code: elevenlabs-sound
                      name: Sound generation (elevenlabs)
                      description: Sound generation (elevenlabs)
                      credits_per_second: '14.000000'
                      mode: SOUND
                      enabled: true
                    url_file: https://tts-clariteia.s3.eu-west-1.amazonaws.com/audio/9nnNB06bo7YdmBA.mp3
                    thumbs_up: false
                    thumbs_down: false
                    source_audio_path: null
                  summary: Text to sound response
                  description: "You receive the code_ref value. Please use this value\
                    \ to check the status of the conversion. \n                  \
                    \          Please use url_file to upload the speech after the\
                    \ conversion is completed"
                TextToMusicResponse:
                  value:
                    id: 20
                    title: New Year's Bells
                    code_ref: HCaKSzEYPcDyhhUE
                    output: mp3
                    text: A short melody about New Year's bells and happiness.
                    uploaded_audio_url: null
                    seconds: 8
                    status: pending
                    created_at: '2025-04-15T05:43:34.871064Z'
                    modified_at: '2025-04-15T05:43:34.871113Z'
                    model:
                      code: musicgen-stereo-large
                      name: Musicgen stereo-large
                      description: Musicgen stereo-large
                      credits_per_second: '10.000000'
                      mode: MUSIC
                      enabled: true
                    url_file: https://tts-clariteia.s3.eu-west-1.amazonaws.com/audio/ecgKgt0qHBCD318.mp3
                    thumbs_up: false
                    thumbs_down: false
                    source_audio_path: null
                  summary: Text to music response
                  description: "You receive the code_ref value. Please use this value\
                    \ to check the status of the conversion. \n                  \
                    \              Please use url_file to upload the speech after\
                    \ the conversion is completed"
                MusicToMusicResponse:
                  value:
                    id: 21
                    title: New Year's Bells With Claps
                    code_ref: 2Q8MwUVqhzVRi3Cg
                    output: mp3
                    text: Add clapping hands
                    uploaded_audio_url: null
                    seconds: 8
                    status: pending
                    created_at: '2025-04-15T05:47:39.618874Z'
                    modified_at: '2025-04-15T05:47:39.619066Z'
                    model:
                      code: musicgen-stereo-melody-large-a2a
                      name: Musicgen Stereo melody large
                      description: Some Description
                      credits_per_second: '12.000000'
                      mode: MUSIC_TO_MUSIC
                      enabled: true
                    url_file: https://tts-clariteia.s3.eu-west-1.amazonaws.com/audio/y1tAMEsTgyu2vWd.mp3
                    thumbs_up: false
                    thumbs_down: false
                    source_audio_path: https://tts-clariteia.s3.eu-west-1.amazonaws.com/audio/ecgKgt0qHBCD318.mp3
                  summary: Music to Music response
                  description: "You receive the code_ref value. Please use this value\
                    \ to check the status of the conversion. \n                  \
                    \                  Please use url_file to upload the speech after\
