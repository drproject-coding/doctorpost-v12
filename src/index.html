<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoctorPost</title>
  <!-- Force Neobrutalism styles -->
  <style>
    /* Critical Neobrutalism styles that must load first */
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif !important;
      font-weight: 700 !important;
      background-color: #FFFF00 !important; /* Bright yellow */
      color: #000000 !important; /* Black text */
    }
  </style>
  <link rel="stylesheet" href="/neobrutalism.css">
</head>
<body>
  <div id="root"></div>
  <!-- Inline script to force the styling -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Force neobrutalism style
      document.body.style.backgroundColor = '#FFFF00';
      document.body.style.color = '#000000';
    });
  </script>
</body>
</html>
